body:
  text: 若次商之積小于第一廉廉隅共法籌第一橫格內之數凡籌第一橫格之數最小故也或僅如共法籌第一橫格內數而無各廉乘而併之之積數則知次商是空位也有空位加三商法既審有空位矣即書于初商數之右以當次商乃以第三界左之積合第二界左之積為三商積而合商之而于一廉法籌之右加空位籌其加空位籌之數如其本乘方乘次之數如三乘方則加三空位籌六乘方則加六空位籌乃至十六乘方則加十六空位籌也二廉以下則加于各廉法之末其加之數之等則視一廉法之空位籌數以次遞減以為等至末廉則皆加一圈而止如七乘方一廉法加七空位籌而二廉之廉法末則加六三廉則加五四廉則加四五廉則加三六廉則加二七廉其末廉也則加一餘倣此加畢乃如次商法商之若有兩空位者其加之等倣此而數則倍之捷法二廉以下不必于各廉法末加但依表廉積各本格之如數倍之而列之于各廉積之各
