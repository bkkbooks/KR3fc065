body:
  text: 而隔位之又視所開之方以為等故但知為開幾乘方即可因方而先定不必列積後乃作也定商之次計之多少即知商之有若干次一則止有初商二則有次商三則有三商四則有四商分商之界初商以左第一為界次商以第二為界三商以第三為界餘倣此凡初次三等商除積皆止于各之界知商數之位一則初商所得者單也二則初商所得者十也次商所得者單也三則初商所得者百也次商所得者十也三商所得者單也四以上倣此
  hash: sha256:87f2a29ad8bd650443489a2724e9f185bdd4111e9b969d78a878da287a52845b
