body:
  text: 現商根餘以次遞加其乘次至末廉之乘次皆下其本乘方乘次一等查表三乘方第一廉在艮格乃于絲行之艮格填商根次坎格填自乘次乾格填再乘一填下截列積各行之凡作無論所開爲幾乘方皆從單位作一起自是而左隔位作則視所開之方爲幾乘方以定所隔之位爲若干位方曰三乘則當隔三位乃于表下截單字下作一隔三位于萬字下作一餘倣此
