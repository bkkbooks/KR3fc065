body:
  text: 表分上下兩截上截列各乘方之廉及隅下截列各乘方之原積故下截末格每行一位自左而右以次標萬千百十等數釋表上截匏行諸乘方表上截一格一乘方多一格即多開一乘方此表自鳥至乾凡十六格可開至十六乘方如乾格平方也坎格立方也蛇格十五乘方也鳥格十六乘方也故匏行之十六格各以所開之方以次按格標出之次土行諸廉凡開方多一乘方即多一廉如三乘方有三廉十六乘方則有十六廉故表土行十六格每格多標出廉字其廉字上各空半格無一二三四至十六等字者以便于臨時因方填注也諸廉次第廉之列于表也其序自上而下故第一廉必填于土行本乘方之格二三廉以下以次遞降其末廉則皆
