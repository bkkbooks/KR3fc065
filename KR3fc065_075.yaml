body:
  text: 本格較為簡易如本廉在㢲格查㢲格之在未行未乃㢲格之右第五行是㢲格有五也即如數倍加五以次列之于㢲格各行一行一首列本格之午行以次而左次列本格之巳行第三列本格之辰行第四列本格之卯行第五列本格之寅行俟求得廉積但以積末位緊接寅行之列之餘倣此若有兩空位者則加兩倍之以上審空位加之法三商以下等商法三商以下諸商法皆同次商惟所用前商數各異耳今列于左次商以初商數為前商數三商合初商次商數為前商數四商合初商次商三商數為前商數五商合初商次商三商四商數為前商數餘倣此還原法以所開得之方根數如其本乘方乘次乘之即得原積
