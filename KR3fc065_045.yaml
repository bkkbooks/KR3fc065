body:
  text: 釋列初商數進位譜凡開方既得初商必列商數凡列商數皆以積左第一商為準而自平方至十六乘方有進商一位進商十七位之等不特方異而進位異即同一方而初商所得之數異則進位亦異其實皆視其第一廉法之有若干位則皆預為列次商數地也兹以鄙意創為譜一行一方一格一數凡開方得初商者按方按數求之省臨時之沈索云耳
  hash: sha256:2e85d75a9e5ad856cfe97a78ecc50040b35f20cb90c3f94bfb86a487ba7aff5b
