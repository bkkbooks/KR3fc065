body:
  text: 以表木行艮格所列前商再乘數三四三乘金行艮格所填之通率四得一三七二而列之于石行艮格是為一廉法以表木行坎格所列前商自乘數四九乘金行坎格所填之通率六得二九四而列之于石行坎格是為二廉法以表木行乾格所列前商根數七乘金行乾格所填之通率四得二八而列之于石行乾格是為三廉法衡按若用捷法則徑查三乘方廉法譜以次列其數于石行艮坎乾各本格可省前商數之各乘以乘通率也借三乘方大籌為隅法乃截二界左之四三八八二四一凡七位為次商之積而商之以表石行艮格所列一廉法一二七二檢各小籌自左而右以次平排于三乘方大籌今借為隅法籌之左為廉隅共法乃查共法籌自一廉法一籌左第一位起至隅法籌右末一位止第三格有四一一六八一差少于二界左之積而大籌末位之一又與積末位之一數相符合乃取其數凡七位自左而右以次平列于表乾格之巳至亥七
