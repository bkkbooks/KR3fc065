body:
  text: 者而概置之又未免因噎廢食矣衡少讀泰西家書熟籌算既更得梅氏諸種喜其立論顯豁于泰西氏之學多發明然獨格格于此輒欲以鄙意完其缺以舉子業纍未遑也今年秋京兆試報罷旅館無聊同人有以廉隅字索解者忽觸舊志乃創立開諸乘方表以濟籌之窮定為初商用籌次三等商第一廉廉隅共法者用籌兼用表二廉以下則專用表平方無需此至三乘以上諸方廉數因方遞增其間錯綜雜糅動至混淆以籌並表御之用籌則易于尋其源用表則可以理其紛順逆次第展表釐然循是法也開百乘方如指掌也亦算學家一快事也夫嘉慶十二年歲次丁卯冬十二月既望南豐劉衡
  hash: sha256:4ab98055a605244545395a4053a7afbe335411a3e0df53d351c609fc3c4adf9b
