body:
  text: 截二界左之積四九七五凡五位為次商積商之以表石行艮格所列一廉法二四八檢各小籌自左而右以次平排大籌左為廉隅共法乃查共法籌自五格至九格數皆八位多于次商積三位自一格至四格數皆七位多于次商積二位即知次商有空位矣乃于初商數八千之右格書百以當次商三商法乃截三界左之積四九七五三六二五凡九位為三商積商之乃依捷法查表艮坎乾各本格之各如數倍之艮格倍加三坎格倍加二乾格倍加一乃于隅法大籌之左一廉法四小籌之右加入三空位籌乃查籌自五格至九格數皆十一位多于三商積二位自一格至四格數皆十位多于三商積一位知三商亦有空位也乃于次商數百之右格書十以當三商四商法乃截四界左之積四九七五三六二五六一六凡十三位為四商積商之乃依捷法
