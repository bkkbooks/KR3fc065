body:
  text: 乘通率以求廉法但查各乘方次商廉法譜依譜列之即得然此法僅可施之次商若三商以下則有所不通矣次商廉法譜見前以大籌為隅法隅者各乘方之小方形也各乘方大籌各橫格所列之各數皆各格根數準本乘方之乘次以乘得之數也中兼二形曰大方形曰小隅形故可以求初商之方積即可借以為次三等商之隅法而以求隅積次商依截積第二之界次商之積也故次商所除之積止于第二之界若首界內有餘積則合首二界內之積而商之皆無過第二界界之左為界內以一廉法併隅法查籌以定次商之數以求一廉積及隅積以第一廉法之數檢各小籌自左而右以次平列于本乘方大籌即隅法之左謂之廉隅共法乃查廉隅共法籌橫格內自一廉法籌左第一位起至大籌未一位止統計之有差少于二
  hash: sha256:c01e82a8ee224cdac40bf1f925336093bdbdd74b7086ff25c55f828db62aedc9
