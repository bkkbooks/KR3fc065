body:
  text: 開方總法具籌籌有二一為各乘方之大籌也初商之積在焉次三等商之隅積在焉如開某乘方則取某乘方大籌置座左或右以備初商及次三等商之用一為自一至九數及空位之各小籌也次三等商第一廉之廉積在焉無論開幾乘方皆取各小籌置座左或右以備次三等商之用填表表者開各乘方列積及次三等商者也凡開方之法莫不燦著于表而表之系也有先經排定標出者凡四焉曰匏行所標之各乘方也曰革行所標前商諸乘次之等也曰自元至亥行所標廉積各位之也曰表下截所標萬千百十等各數也有待于臨時隨所開之方而填所當用之法者凡四焉曰土行各格
