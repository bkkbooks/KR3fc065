body:
  text: 籌表開四乘方第一式商二次式今有四乘方積三十七億千七百三十九萬八千四百三十二尺問方根具籌填表列積皆詳總法及三乘方第一式積內有二知有初商有次商初商法初商以左第一為界查此在積三十之行乃截三七七三凡五位為初商積商之乃查四乘方大籌其差少于三七七三者為三二七六八乃取其數除初商積餘初商積四三五查三二七六八在大籌第八格其根八也而積有二其位十也乃定初商為八十乃查列初商數進位譜知應進五位乃于列積首之行左進五行書八十次商法以前商數八依表革行震艮坎乾四格所標各乘次乘之得數列于木行震艮坎乾各本格謂之前商各乘數次以表木行震艮坎乾四格所列
