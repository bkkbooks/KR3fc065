body:
  text: 行以次而左數盡乃止而皆列其併得之數于本行之橫空格若本行數已逾十則于本行之左一行加一若逾二十或五十則于本行之左一行加二或五而皆列其所餘之數于本行之橫空格如戌行有數六八並得一十四是逾十也則加一于酉行而書所餘之四于戌行之橫空格又如申行有數八九九八八六五並得五十三是逾五十則加五于未行而書所餘之三于申行之橫空格餘倣此若逾十進左之外恰無餘數則列于本行之橫空格併畢乃以橫空格所列併得之數除餘積是為次商書次商數進位法既得次商應書商數按次商理本歸除但以所除餘積之數之在廉隅共法籌橫格者其首一位是空位與否以定其書法之進退空則于所除餘積之首位進一行書之進者進而左也不空則于所除餘積之首位本行內書之以上次商之法審空位法
  hash: sha256:c5c3acc2ffbeff94b539bc97277fdfe9b59ff8e369ef5cf30061f3cc29800f72
