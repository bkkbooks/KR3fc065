body:
  text: 凡前商乘次之等皆標題于表之革行但查表自第一廉至末廉各本格之革行所標前商乘為若干次而依表所標乘次各乘之得數謂之前商各乘數乃列之于木行之各本格其列之之序皆自木行各本格之左以次而右數多者則疉書于本格內或上下疉之為序或左右疉之為序如數末位有者並列之不可抹去以前商各乘數乘各通率求各廉法各乘方各有其通率凡通率皆填于表之金行乃以木行各格所列之前商各乘數乘金行各本格所填之通率得數謂之廉法而列之于石行各本格其列之之序皆自石行各本格之左以次而右數多者則疉書于本格內或上下疉之為序或左右疉之為序如數末位有者並列之不可抹去如列前商各乘數法捷法不必求前商各乘數亦不必以前商各乘數
