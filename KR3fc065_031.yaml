body:
  text: 各乘數即現商諸乘所乘得之數也不現商之者省文也次現商之行則皆知為現商之各乘數也其數皆于竹行各本格列之次自冀至亥三十六行廉積列廉積法見後開方總法及開方式廉積梅氏新其名曰定積表則質言之廉積者現商各乘數乘各本格之廉法而得之數也故廉積次現商各乘數各廉積既得但併入隅法于首廉之格而並以除餘實則續商畢故以廉積殿焉廉積各格標各格之左虛其位以待廉積之列也各格之右皆位也不皆標者便于其格之為第一廉可併入隅法于其位為廉隅共法也廉隅各格標之等凡諸乘方其第一廉之位之大于其隅位也皆視其方以為等二廉以下其大以次遞減至末廉皆大于其隅一位故標亦必視其方之廉以為等也如六乘方
