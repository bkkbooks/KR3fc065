body:
  text: 各乘數卽現商諸乘所乘得之數也不現商之者省文也次現商之行則皆知爲現商之各乘數也其數皆于竹行各本格列之次自冀至亥三十六行廉積列廉積法見後開方總法及開方式廉積梅氏新其名曰定積表則質言之廉積者現商各乘數乘各本格之廉法而得之數也故廉積次現商各乘數各廉積旣得但併入隅法于首廉之格而幷以除餘實則續商畢故以廉積殿焉廉積各格標各格之左虛其位以待廉積之列也各格之右皆位也不皆標者便于其格之爲第一廉可併入隅法于其位爲廉隅共法也廉隅各格標之等凡諸乘方其第一廉之位之大于其隅位也皆視其方以爲等二廉以下其大以次遞減至末廉皆大于其隅一位故標亦必視其方之廉以爲等也如六乘方
  hash: sha256:d84017cfc12e41bd1cee4eee06649f365b31e2492940ffd4204769173bc084f5
