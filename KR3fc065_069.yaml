body:
  text: 捷法不必遍乘但依表所填乘次查各乘方大籌內同根之各格數如法列于表竹行本格亦同此法次三四等商皆可用以現商各乘數乘各廉法求各廉積第一廉廉積及隅積既列于自冀至亥行之第一廉本格矣其第二廉以下則以竹行各格所列之現商各乘數乘石行各本格所列之廉法得數謂之廉積而列之于自冀至亥行之各本格其列之之序自左而右在本格中一數一行不得疉擠及空斷及倒置其數之尾位無論是字是必緊接各本格有之行之左一行書之決不可誤所以定位也且便于並算也併各廉積及隅積以除餘積而完次商既列各廉積矣乃以一廉至末廉各廉積及隅積用併法併之以縱行之數合算一行為一位先從亥行各數並起而列其並得之數于亥行之橫空格如二與七並得九三與四並得七之類橫空格者即表上截下截之間之橫空格也次戌行又次酉
  hash: sha256:baf7eb79f7c71efcff5d21f519bf718da05e684e1307feffc936921e12e69d2d
