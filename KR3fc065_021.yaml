body:
  text: 釋開方表用表之處凡表皆用于三乘以上之方平方立方無需此平方立方用表亦可凡表皆用于三乘以上諸方之次三等商初商無需此表例凡表縱行之序皆自上而下横格之序皆自左而右蓋祖泰西筆筭籌筭法爲之表圍線外所列八卦八陣八音十二州等字特借以編排行格以便立説者之指稱及覽者之查考也釋表之例凡釋表縱者曰行横者曰格凡釋表有現已標題者曰標有待于臨時因方填注者曰填得數皆曰列釋表下截
