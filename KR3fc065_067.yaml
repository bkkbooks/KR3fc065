body:
  text: 界內之餘積而大籌橫格末一數與積末一數適合之數其數在共法籌第幾格即次商為第幾格數乃取其數列于自冀至亥行之第一廉本格其列之之序自左而右在本格中一數一行不得疉擠及空斷及倒置其數之尾位必書于本格之亥行此定位之法所以並積决不可誤謂之廉隅共積若分言之則以其數之在小籌格內者曰一廉積在大籌格內者曰小隅積以現商數各乘之在次商則以次商為現商在三商則以三商為現商在四商則以四商為現商凡現商乘次之等皆填注于表之絲行但查表自第一廉至末廉各本格之絲行所填現商乘為若干次而依表所填乘次各乘之得數謂之現商各乘數乃列之于竹行之各本格其列之之序皆自竹行各本格之左以次而右數多者則疉書于本格內或上下疉之為序或左右疉之為序若數末位有者並列之不可抹去俱同列前商各乘數法
