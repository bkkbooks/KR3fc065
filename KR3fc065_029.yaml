body:
  text: 廉法梅氏新其名曰泛積表則質言之廉法者前商各乘數乘各本格之通率而得之數也故廉法次通率其數皆于石行各本格列之次絲行現商現商者今所擬商之數也在次商則以次商為現商在三商則以三商為現商餘倣此現商諸乘次之等填現商諸乘次之等之法見後各乘方填表式現商諸乘次之填于表其等自上而下因廉遞加第一廉皆用現商根二廉已下以次遞加至末廉乘次皆下其本乘方一等如四乘方第一廉用現商根二廉則用現商自乘三廉則用現商再乘四廉其末廉也則用現商三乘三乘是下四乘一等矣又如五乘方第一廉用現商根而二廉則用現商自乘三廉則用現商再乘四廉則用現商三乘五廉其末廉也則用現商四乘四乘是下五乘一等矣餘俱倣此蓋與前商諸乘次之等相為順逆者也前商乘次因廉遞減而下現商乘次則因廉遞加而下故前商末廉用商根而現商則首廉用商根前商乘次首廉下其本乘方一等而現商乘次則末廉下其本乘方一等也次竹行各乘數列各乘數法見後開方總法及開各乘方
