body:
  text: 釋列初商數進位譜凡開方旣得初商必列商數凡列商數皆以積左第一商爲準而自平方至十六乘方有進商一位進商十七位之等不特方異而進位異卽同一方而初商所得之數異則進位亦異其實皆視其第一廉法之有若干位則皆預爲列次商數地也兹以鄙意創爲譜一行一方一格一數凡開方得初商者按方按數求之省臨時之沈索云耳
  hash: sha256:ad0a5fcb58a3b5b7a49f7168c839d2b25a854ae80b85af8028f1c7ab16b5be88
