body:
  text: 次木行各乘數列乘數法見後開方總法及開各乘方各乘數卽前商諸乘所乘得之數也不前商之者省文也次前商之行則皆知爲前商之各乘數也其數皆于木行各本格列之次金行通率塡通率法見後各乘方塡表式通率者廉率也圖譜見後宋儒治易者謂之加倍𣀵法古筭家謂之開方求廉率泰西乃謂之通率梅氏又易其名曰定率凡開方每加一乘卽加一廉加一廉卽加一廉率如三乘方則通率凡三曰四曰六曰四也四乘方則通率凡四曰五曰一曰一曰五也餘倣此通率之塡于表其序自上而下其首一數皆填于金行本乘方之格與第一廉同格餘以次填注其末一數皆塡于金行乾格如三乘方在艮格其通率首一數四也塡于金行艮格以次而降其通率之次數六也塡于金行坎格其通率之末數四也塡于金行乾格皆以其數以次與各本格之前商各乘數乘而求廉法故通率次前商各乘數次石行廉法列廉法法見後開方總法及開各乘方
