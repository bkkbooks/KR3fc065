body:
  text: 捷法不必徧乘但依表所填乘次查各乘方大籌內同根之各格數如法列于表竹行本格亦同此法次三四等商皆可用以現商各乘數乘各廉法求各廉積第一廉廉積及隅積旣列于自冀至亥行之第一廉本格矣其第二廉以下則以竹行各格所列之現商各乘數乘石行各本格所列之廉法得數謂之廉積而列之于自冀至亥行之各本格其列之之序自左而右在本格中一數一行不得疉擠及空斷及倒置其數之尾位無論是字是必𦂳接各本格有之行之左一行書之决不可誤所以定位也且便于倂筭也併各廉積及隅積以除餘積而完次商旣列各廉積矣乃以一廉至末廉各廉積及隅積用併法併之以縱行之數合筭一行爲一位先從亥行各數倂起而列其倂得之數于亥行之横空格如二與七倂得九三與四倂得七之類横空格者卽表上截下截之間之横空格也次戌行又次酉
  hash: sha256:68f23eda6e461fe89f4621ab9a651e059391f8b2dd017877943b1eab6095c124
