body:
  text: 列之廉法得數謂之廉積以次自左而右平列于艮坎乾各本格之廉積行內一行一位各數之尾位無論是字是皆𦂳接各格行之左一行書之艮格二廉積尾位必列于本格之申行坎格三廉積尾位必列于本格之酉行乾格四廉積尾位必列于本格之戌行乃倂各廉積及隅積得四三五九八四三二以除積恰盡積有二知次商所得是單數查一廉法小籌首位有空位知商數應書積首左行乃定次商爲二尺而于所除餘積首位四之左行書二尺恰與初商八十相接答曰方根八十二尺還原法以八二乘四次卽得原積
