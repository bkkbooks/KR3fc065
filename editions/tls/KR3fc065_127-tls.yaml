body:
  text: 之廉積行內一行一位各數之尾位無論是字是皆𦂳接各格行之左一行書之詳見總法及三四乘方各式乃併各廉積及隅積得八一三四五九四六四以除積恰盡積有二知次商所得是單數查一廉法小籌首位無空位知商數應書積首本行乃定次商爲八尺而于所除餘積首位八之本行書八尺恰與初商數四十相接答曰方根四十八尺還原法以四八乘五次卽得原積士琳案原稿脫五乘方表今補
  hash: sha256:a8f8628e5cb82d158a9e3fdbd080c3ecd3ee78abd9912af02df52be8a638eb89
