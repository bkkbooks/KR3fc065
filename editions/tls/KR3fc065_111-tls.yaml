body:
  text: 前商各乘數乘金行震艮坎乾各本格所填之通率得數列于石行震艮坎乾各本格謂之廉法或用捷法徑查四乘方廉法譜以次列其數于各本格次借四乘方大籌爲隅法乃截二界左之積四三五九八四三二凡九位爲次商積商之乃以表石行震格所列一廉法二四八檢各小籌自左而右以次平排隅法大籌之左爲廉隅共法乃查共法籌第二格有四九六三二差少于二界左之積而大籌末位之二又與積末位之二數適相符乃取其數凡九位自左而右以次平列于表震格之卯至亥九行內一行一位其尾位二必列于震格之亥行是爲一廉積隅積而此兩積在共法籌第二格卽現商二數乃列二于竹行震格旣列一廉積隅積矣二廉以下則以現商數依表絲行艮坎乾三格所填各乘次乘之得數列于竹行各本格謂之現商各乘數次以表竹行艮坎乾三格所列現商各乘數乘石行艮坎乾各本格所
