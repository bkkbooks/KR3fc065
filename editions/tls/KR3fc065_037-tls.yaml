body:
  text: 釋廉率圖右廉率圖最上一層者本數也卽大方也大方無隅而數從此起如易之太極然次列一者方邊也西法謂之根左一爲初商之根右一卽次商之根也如易之兩儀然自是而下其相生之序皆加一筭如第二層一一以一一乘之卽生第三層之一二一中二卽平方也廉率也置一二一又以一一乘之卽生第四層之一三三一中三三卽立方之廉率也置一三三一又以一一乘之卽生第五層之一四六四一中四六四卽三乘方之廉率也四乘以上準此加之至于百乘其廉率皆加一法也此廉率所由生也廉率何以不用圖左一右一之數左一爲初商之大方右一爲次商之小隅故用其中之廉率若方率若隅率則有各乘方之各大籌在
  hash: sha256:f9aca837481042156d6a286554120d71f9ef15308183786fb85f174a78a37f68
