body:
  text: 籌表開三乘方捷法第三式次商三商俱有空位乃加而四商式今有三乘方積四千一百十萬千九百七十五億三千六百二十五萬六千百一十六尺問方根具籌塡表列積皆詳總法及第一式積有四知有初商有次商有三商有四商初商法初商以左第一爲界查此在萬之行乃截四一凡四位爲初商積商之乃查三乘方大籌其差少于四一者爲四九六乃取其數除初商積餘初商積四查此數在大籌第八格其根八也而積有四其位千也乃定初商爲八千乃查列初商數進位譜知應進四位乃依譜于首之行左進四行書八千次商法以前商各乘數乘艮坎乾各本格之通率求各廉法得數列于石行之各本格詳見總法及第一式或用捷法徑查三乘方廉法譜以次列之尤簡次借三乘方大籌爲隅法乃
  hash: sha256:816e0372fdfd4631b139da0598b6acb190bd2387f9e152724e7c231d494197e4
