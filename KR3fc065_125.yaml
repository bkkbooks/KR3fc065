body:
  text: 石行巽至乾各本格謂之廉法或用捷法徑查五乘方廉法譜以次列其數于各本格次借五乘方大籌為隅法乃截二界左之積八一三四五九四六四凡十位為次商積商之乃以表石行巽格所列一廉法六一四四檢各小籌自左而右以次平排隅法大籌之左為廉隅共法乃查共法籌第八格有四九一五四六二一四四差少于二界左之積而大籌末位之四又與積末位之四數恰相符乃取其數凡十位自左而右以次平列于表巽格之寅至亥十行內一行一位其尾位四必列于巽格之亥行是為一廉積隅積而此兩積在共法籌第八格即現商八數乃列八于竹行巽格既列一廉積隅積矣二廉以下則以現商數八依表絲行震至乾四格所填各乘次乘之得數列之竹行各本格謂之現商各乘數次以表竹行震至乾四格所列現商各乘數乘石行震至乾各本格所列之廉法得數謂之廉積以次自左而右平列于震至乾各本格
