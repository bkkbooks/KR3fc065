body:
  text: 于竹行震格旣列一廉積隅積矣二廉以下則以現商各乘數乘艮坎乾各本格之廉法求各廉積得數自左而右以次平列于艮坎乾各本格之廉積行一行一位各數之尾位無論是字是皆𦂳接各本格行之左一行書之艮格二廉積尾位必列于本格之巳行坎格三廉積尾位必列于本格之未行乾格四廉積尾位必列于本格之酉行乃幷各廉積及隅積得二六二六七九一一六九二四以除積恰盡積有三知三商所得是單數查一廉法小籌首位無空位知商數應書積首本行乃定三商爲四寸而于所除餘積首位二之行書四寸恰與次商十相接答曰方根六百四寸還原法以六四乘四次卽得原積
