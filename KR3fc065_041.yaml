body:
  text: 釋通率譜廉率梅氏謂之定率同文筭指謂之通率今仍之梅氏有廉率立成圖式與古圖等衡以鄙意創爲譜方之等自上而下廉之等則自右而左一格一方一行一廉方盡則格盡廉盡則行盡開方者按方求率展譜卽得釋譜古但有圖譜太史公乃易譜爲表譜表一而已矣此稱譜者以有開方表故轉易譜爲表也恐稱名之混也篇中稱譜者三此其一下如列初商數進位譜次商廉法譜義並同
