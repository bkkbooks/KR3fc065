body:
  text: 千行作百行作十行作餘倣此列積以補末位凡開方減隅積必盡于單位故原積遇有缺單位者必作于單位行內以補其位若單位之左尚有缺者缺若干位則補若干必補至單位乃止如原積止于十數是缺單位也則于單位行作以補之又如原積止于萬數是缺千百十單等四位也則于千百十單各行內作各以補之餘倣此此開方最要之法誤則作分界毫釐千里矣作既列原積矣乃從原積右末行單位上作一此各乘方同既乃逆數自右而左隔位作所隔之位視本乘方以為等如平方隔一位作立方隔二位作三乘方隔三位作四乘方隔四位作乃至十六乘方隔十六位作也必從單位起者凡開方減隅積必盡于單位也李之藻所譯同文算指及羅雅谷籌算但言起末位則失之混捷法填表時即可作蓋單位之各乘方皆同
  hash: sha256:5628422d6cd4cda99cf6e3c6dbe14d17967af81b89133743cac817d35fd82167
