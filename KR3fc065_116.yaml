body:
  text: 籌表開四乘方第二式次商有空位乃加而三商式今有四乘方積八十萬三千八百六十七億九千一百一十六萬九千百二十四寸問方根具籌填表列積皆詳總法及三乘方第一式積內有三知有初商有次商有三商初商法初商以左第一為界查此在積八百之行乃截八三八凡四位為初商積商之乃查四乘方大籌其差少于八三八者為七七七六乃取其數除初商積餘初商積二六二查七七七六之數在大籌第六格其根六也而積有三其位百也乃定初商為六百乃查列初商數進位譜知應進四位乃于列積首之行左進四行書六百次商法以前商各乘數乘震艮坎乾各本格之通率求各廉法得數列于石行之各本格詳見總法及三乘方第一式或用捷法徑查四乘方廉法譜以次列之尤簡次借四乘方大籌為隅法乃截二界左之積二六二六七九一一凡八
