body:
  text: 位為次商積商之乃以表石行震格所列一廉法六四八檢各小籌自左而右以次平排隅法大籌左為廉隅共法乃查共法籌自二格至九格數皆九位多于次商積一位其第一格六四八一雖只六位而數大于次商積則知次商有空位矣乃于初商數六百之右格書十以當次商三商法乃截三界左之積二六二六七九一一六九二四凡十三位為三商積商之乃用捷法查表震艮坎乾各格之如數各倍之詳見總法及三乘方第二式乃于隅法大籌之左一廉法各小籌之右加入四空位籌方曰四乘故一廉法加空位籌凡四查籌有二五九二一二四少于三界左之積而大籌末位之四又與積末位之四數恰相符乃取其數凡十三位自左而右以次平列于表震格之塗至亥十三行內一行一位其尾位四必列于震格之亥行是為一廉積隅積而此兩積在共法籌第四格即現商四數乃列四
