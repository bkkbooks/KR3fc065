body:
  text: 士琳案廉法譜原稿佚去今據後卷所開之方自三乘以至五乘而已故亦僅補三乘四乘五乘三譜以見意其五乘方以次至十六乘方由此可以例推釋次商廉法譜廉法者初商各乘數乘各通率而得之數也凡開方皆有實無法廉法卽其法也梅氏謂之汎積此乃質言之凡方廉愈多則法數愈增猝不易成衡輒以鄙意創爲譜以乘得之數按方按廉按數列之方各爲譜一行一廉一格一數開方者展譜求之廉法立成思過半矣三四等商廉法譜續出
