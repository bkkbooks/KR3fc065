body:
  text: 籌表開三乘方捷法第二式次商有空位乃加而三商式今有三乘方積一千三百三十億九千百七十一萬三千八百五十六問方根具籌填表列積皆詳總法及第一式積內有三知有初商有次商有三商初商法初商以左第一為界查此在億之行乃截一三三凡四位為初商積商之乃查三乘方大籌其差少于一三三者為一二九六乃取其數除初商積餘初商積三四查一二九六之數在大籌第六格其根六也而積有三其位百也乃定初商為六百乃查初商數進位譜知應進三位乃依譜于百之行左進三行書六百次商法以前商各乘數乘艮坎乾各本格之通率求各廉法得數列之石行之各本格詳見開方總法及第一式或用捷法徑查三乘方廉法譜以次列之尤簡次借三乘方大籌為隅法乃截二界左之積三四九七一凡六位為次商
  hash: sha256:43f412aeb6771e32ea860614c30d9c230d6bf434630ff51ce5dc760a6c0b0710
