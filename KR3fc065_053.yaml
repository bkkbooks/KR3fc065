body:
  text: 廉字上所空一二三四等順編之數也曰金行各格所空通率之各數也曰絲行各格現商所空自商根以次遞增之乘次也曰下截列積各行所空自單位起而因方隔位作之各也凡填表之法見下各乘方填表式皆依式填注之以備初商列積次三等商求廉法廉積之用已上備算具之法原積列位假如有某乘方積若干問方根若干法以原積若干位位者數之等也自左而右以次橫列于表下截紅縱行內各位書于各行如萬位書于萬行十位書于十行一行一位不得疉擠及倒置列積以存空位列積一行一位如原積中有空位則作于本空位行內以存其位空若干位則作若千如原積一萬八百中缺千數是千位空一位也則于千行作又如原積五萬七尺中缺千數百數十數是千百十空三位也則于
  hash: sha256:2f47e26bde9c34911edd25f8a0d8a8719bc2ab0a57fdf42ff2db38789b8aaf8d
