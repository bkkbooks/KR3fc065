body:
  text: 其第一廉必大于其隅六位六乘方之第一廉在離格故于離格之午行標午行者右第六行也自是遞降二廉大隅五位三廉大隅四位四廉大隅三位五廉大隅二位六廉其末廉也厪大于其隅一位而亦因之遞減故于巽格則標于未行也震格則標于申行也艮格則標于酉行也坎格則標于戌行也乾格在標于亥行也此表開至十六乘方其第一廉大于其隅十六位十六乘方之第一廉在鳥格故于鳥格之元行標元行者右第十六行也自是遞減二廉大隅十五位至十六廉大隅一位其標皆因之遞減表兩截之間之橫空格列並數法見開方總法及開各乘方表上截下截之間有一橫空格隔斷之其格無縱行所以列上截各行之各廉積及隅積之併數以除下截各行之餘積也凡開方既求得各廉積乃列入隅積于第一廉之格乃用併法併各廉積及隅積之數以一行為一位而列其併得之數于各本行之橫空格
