body:
  text: 于表艮坎乾各格之各再如數倍之艮格再加三並前所加共六至本格之卯行止坎格再加二並前所共加四至本格之午行止乾格再加一並前所加共二至本格之酉行止乃于隅法大籌之左一廉法四小籌之右再加入三空位籌並前所加共六位籌乃查籌有四九六一六少于四界左之積而大籌末位之六又與積末位之六數恰相符乃取其數凡十三位自左而右以次平列于表艮格之塗至亥十三行內一行一位其尾位六必列于本格之亥行是為一廉積隅積而此兩積在共法籌第二格即現商二數乃列二于竹行艮格既列一廉積隅積矣二廉以下以現商各乘數乘坎乾各本格之廉法求各廉積詳見總法及第一式得數自左而右以次平列于坎乾各本格之廉積行一行一位各數之尾位必緊接各本格之之行左一行書之坎格二廉積尾位六必列于本格之巳行乾格三廉積尾位六必列之于本格之申行乃並各廉積及隅積得四九七五三六二
