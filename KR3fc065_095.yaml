body:
  text: 積而商之以表石行艮格所列一廉法八六四檢各小籌自左而右以次平排大籌左為廉隅共法乃查共法籌自二格至九格數皆七位多于次商積一位其第一格八六四一雖止六位而數大于次商積則知次商有空位矣乃于初商數六百之右格書十以當次商三商法乃截三界左之積三四九七一三八五六凡十位為三商積而商之乃用捷法查表艮坎乾各格之如數倍之艮格在酉行是有三也乃如數倍加三于艮格一行一至午行止坎格在戌行是有二也乃如數倍加二于坎格一行一至申行止乾格在亥行是止有一也乃如數倍加一于乾格一行一至戌行止乃于隅法大籌之左一廉法各小籌之右加入三空位籌方曰三乘故一廉法加空位籌凡三查籌有三四五六二五六少于三界左之積而大籌末位之六又與積末位之六數恰相符乃取其數凡十位自左而右以次平列于表艮格之寅至亥十行內一行一位其尾位六必列于艮格之
  hash: sha256:0cf024f6998a9b6b9e9d41a9dfa10ff5929fb6936645462c9e65bd6e48e58bdd
