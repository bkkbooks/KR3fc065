body:
  text: 釋開方籌籌根凡大籌橫格皆九其第幾格即第幾數如第一格一數也第三格三數也第九格九數也故諸大籌右縱行皆以硃按格標出自一至九等字皆即籌面各橫格墨書各積數之根也其用硃書且另為一行而無橫格者恐其與各左格之墨書數混也士琳案原稿凡用硃書今悉改用陰文下並同籌積凡大籌各橫格墨書之積數皆各格硃書各根數準各乘方之乘次乘之以為數如第六格其根數六也六之自乘為三六而平方籌第六格以之六之再乘為二一六而立方籌第六格以之六之三乘為一二九六而三乘方籌第六格以之乃至六之十六乘為一六九二六六五九四四四七三六而十六乘方籌第六格以之餘格之數準此惟第一格之根數一雖百乘皆一也故諸大籌第一格之一皆同
