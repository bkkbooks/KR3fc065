body:
  text: 亥行是爲一廉積隅積而此兩積在共法籌第四格卽現商四數乃列四于竹行艮格旣列一廉積隅積矣二廉以下以現商各乘數乘坎乾各本格之廉法求各廉積得數自左而右以次平列于坎乾各本格之廉積行一行一位各積數之尾位無論是字是必𦂳接各本格之行左一行書之坎格二廉積尾位六必列之本格之末行乾格三廉積尾位六必列之本格之酉行乃倂各廉積及隅積得三四九七一三八五六以除積恰盡積有三知三商所得是單數查一廉法小籌首位無空位知商數應書積首本行乃定三商爲四尺而于所除餘積首位三之行書四尺恰與次商十相接答曰方根六百四尺還原法以六四乘三次卽得原積
