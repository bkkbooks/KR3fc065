body:
  text: 以上列積之法初商依截積左第一初商之界也凡初商之積皆不過左第一之界故初商必查左第一之所在而以左之位為初商積而商之在原積首位者則獨以首一位為初商之積如在原積第五位則合左五位為初商之積餘倣此初商查籌除積完初商既于左第一之界截初商之積矣乃取本乘方大籌橫所列之數與之比勘有與初商積適合者即用以除初商積若無與初商積適合之數則取其差少于積者用以除積是為初商知初商之數初商既除積矣乃查所用以除積之數在大籌第幾格即知初商為第幾數如開三乘方用三乘方籌內八一以除積而八一在籌第三格即知初商為三數也又如開十六乘方用十六乘方籌內一三一七二以除積而一三一七二在籌第二格即知初商為二數也餘俱倣此
  hash: sha256:01b330cca544dabb821a3dcda2164509d8b3553bcddd44d189149ff2dd444d14
