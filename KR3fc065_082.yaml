body:
  text: 籌表開三乘方捷法第一式商二次式今有三乘方積二千八百三十九萬八千二百四十一尺問方根若干列積具籌填表訖乃以積自左而右以次平列于表下截一數一行本數書于本行乃書二于千行八于百行三于十行九于萬行八于千行二于百行四于十行一于單行是爲列積積內有二知有初商有次商初商左第一初商之界也此在積九萬之位則九以左皆初商之積也乃截二八三九凡四位商之乃查三乘方大籌各横格俱無適合于初商積之數惟第七格之二四一差少于初商積之數乃以二四一除初商積二八三九餘積四百三十八萬查二四一在大籌第七格其根七也而積內有二
