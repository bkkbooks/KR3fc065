body:
  text: 造籌以牙或竹或木版或合楮或畫紙爲之以平正爲尚長短厚薄無定度諸籌相準不得各有長短厚薄之異泰西家籌縱而取數横自左而右如古廉率圖又彷彿所用珠筭梅氏易爲籌横數縱今製皆仍泰西之舊而斜行稍𣀵通之小籌詳見籌筭易知大籌大籌者開各乘方之籌也凡大籌横皆九格與小籌等故大籌長必與小籌等其各横格界線亦必與小籌符合無出入其縱斜行視本乘方每多一數如三乘方籌則縱斜行凡四如八乘方籌則縱斜行几九乃至十六乘方籌其縱斜行十有七也其右一行無横格者恐其混合籌面各横格之數也凡大籌廣窄可任意爲之籌式如左
  hash: sha256:615b709f4ea2bb8eca663b9ae6ab17da7cc767501d793da4f3a905b0d36448e4
