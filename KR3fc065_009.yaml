body:
  text: 造籌以牙或竹或木版或合楮或畫紙為之以平正為尚長短厚薄無定度諸籌相準不得各有長短厚薄之異泰西家籌縱而取數橫自左而右如古廉率圖又倣佛所用珠算梅氏易為籌橫數縱今製皆仍泰西之舊而斜行稍𣀵通之小籌詳見籌算易知大籌大籌者開各乘方之籌也凡大籌橫皆九格與小籌等故大籌長必與小籌等其各橫格界線亦必與小籌符合無出入其縱斜行視本乘方每多一數如三乘方籌則縱斜行凡四如八乘方籌則縱斜行几九乃至十六乘方籌其縱斜行十有七也其右一行無橫格者恐其混合籌面各橫格之數也凡大籌廣窄可任意為之籌式如左
  hash: sha256:2eb99fd14c1e4158ad54cb26e8103224772f267e5cf8dd555aead98ccb96d90a
