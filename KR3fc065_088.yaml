body:
  text: 行內一行一位其尾位一必列于艮格之亥行是為一廉積隅積而此兩積在共法籌第三格即現商三數乃列三于竹行艮格既列一廉積隅積矣二廉以下則以現商數依表絲行坎乾二格所填各乘次乘之得數列之竹行坎乾各本格謂之現商各乘數查表絲行坎格填自乘乃以現商三自乘之得九而列之于竹行坎格查表絲行乾格填再乘乃以現商三再乘之得二七而列之于竹行乾格以表竹行坎乾二格所列現商各乘數乘石行坎乾各本格所列之廉法得數列于廉積各行坎乾各本格其各數之尾位必緊接各本格有之行之左一行書之謂之廉積以表竹行坎格所列現商自乘數九乘石行坎格所列之二廉法二九四得二六四六為二廉積積凡四位乃以次列之于坎格之午未申酉四行內
