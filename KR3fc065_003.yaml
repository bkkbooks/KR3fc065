body:
  text: 籌表開諸乘方捷法自序宣城梅勿菴先生本泰西羅雅谷籌筭開方廉隅共法之法𢰅開方捷法一卷祗及平方立方而不及三乘以上諸乘方蓋隅者小方形也借方籌爲隅法在平方則以之合廉法籌在立方則以之合平廉法籌夫平方之廉法立方之平廉法古謂之方法與諸乘方之第一廉等但以次商之根乘之卽得廉積故列籌九格其數皆可取商雖百乘方可用籌者也獨其開立方所用之長廉亦列各籌羅氏列之立方籌右梅氏列之立方籌下則甚無謂蓋長廉卽諸乘方之第二廉以下諸廉也必以次商之平羃乘之乃得𠔳積不能徑以次商之根乘之而得廉積也故以長廉法列籌惟籌首行數可徑用蓋次商一其自乘平羃亦一與次商根同數也餘格之數皆于籌無取梅氏襲泰西法于此處未及變通之固宜其法之僅强施之立方而三乘以上諸方廉法漸增者之格礙難行也至所𢰅少廣拾遺乃并廉隅共法之用籌
