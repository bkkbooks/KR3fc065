body:
  text: 籌表開五乘方第一式商二次式今有五乘方積一百二十二億三千百五十九萬千四百六十四尺問方根具籌填表列積皆詳總法及三乘方第一式積內有二知有初商有次商初商法初商以左第一為界查此在積百之行乃截一二二三凡五位為初商積商之乃查五乘方大籌其差少于一二二三者為四九六乃取其數除初商積餘初商積八一三四查四九六在大籌第四格其根四也而積有二其位十也乃定初商為四十乃查列初商數進位譜知應進四位乃于列積首之行左進四行書四十次商法以前商數四依表革行㢲至乾五格所標各乘次乘之得數列于木行㢲至乾各本格謂之前商各乘數次以表木行㢲至乾五格所列前商各乘數乘金行㢲至乾各本格所填之通率得數列于
  hash: sha256:544987c0a67defc6557769cedefecf184e339598811a3cfc0083dfccb6b0ec75
