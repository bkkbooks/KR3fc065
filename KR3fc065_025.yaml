body:
  text: 在土行乾格如三乘方有三廉本方在艮格其第一廉亦在土行艮格第三廉其末廉也以次而降在土行乾格又如十六乘方有十六廉本方在鳥格其第一廉亦在土行鳥格第十六廉其末廉也在土行乾格次革行前商前商者前已商得之數也在次商則以初商爲前商在三商則合初次商爲前商在四商則合初次三商爲前商餘倣此前商諸乘次之等前商諸乘次之標于表其等自上而下因廉遞減第一廉乘次皆下其本乘方一等如四乘方第一廉用前商三乘五乘方第一廉用前商四乘乃至十六乘方第一廉用前商十五乘是也二廉以下以次遞減末廉皆至前商根止如四乘方第一廉用前商三乘而二廉則用前商再乘三廉則用前商自乘四廉其末廉也則用前商根又如五乘方第一廉用前商四乘而二廉則用前商三乘三廉則用前商再乘四廉則用前商自乘五廉其末廉也則用前商根餘倣此故表革行之十六格所標題各乘次皆以次遞減而商根乃在本行乾格也
