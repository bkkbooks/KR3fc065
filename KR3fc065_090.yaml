body:
  text: 一行一位坎格在戌行故尾位六書于戌左之酉行也以表竹行乾格所列現商再乘數二七乘石行乾格所列之三廉法二八得七五六為三廉積凡三位乃以次列之于乾格之申酉戌三行內一行一位乾格在亥行故尾位六書于亥左之戌行也乃以艮坎乾三格所列之廉積三艮格所列之隅積一用並法並之列于表間之橫空格得四三八八二四一以除餘積恰盡積有二知次商所得是單數查一廉積小籌首位有空位乃于所除餘積首位四之行左進一行書三恰與初商七十相接答曰方根七十三還原法以七十三乘三次即得原積
