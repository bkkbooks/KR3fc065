body:
  text: 書初商數進位等筭家以左爲進几言進者進而左也旣得初商應書商數則書商數之位次宜知也自開平方至十六乘方其書初商數也皆以左第一爲主而有進一位至進十七位之等皆視其第一廉法之進若干位而初商數之進位亦如之其實則預爲書次商地也若宜進若干位而不進若干位則初商次商同位矣不宜進若干位而進若干位則初商次商不相接矣進法見前列初商數進位譜以上初商之法審次商之有無雖有二而初商除積恰盡是無次商也雖有二雖除積未盡而初商已除動單數亦不必更求次商也旣有二而除積未盡亦未除動單數是有次商矣以前商數各乘之次商以初商爲前商三商合初次之商爲前商四商合初次三之商爲前商
