body:
  text: 三乘方填表法一填土行各廉字上所空各數凡廉數皆如其方之乘次之數方曰三乘則廉有三種凡第一廉必填于本乘方之格餘廉以次順列查表三乘方標于艮格乃于土行之艮格廉字上填一字是爲三乘方之第一廉格次坎格廉字上塡二字是爲三乘方之第二廉格次乾格廉字上塡三字是爲三乘方之第三廉格一填金行之通率凡通率之數皆如其方之乘次之數方曰三乘則通率有三率攷通率譜第三層所列三乘方之通率凡三曰四也曰六也曰四也凡通率首數必塡于第一廉之格餘以次順列查表三乘方第一廉在艮格乃以通率首數四塡于金行之艮格次六塡坎格次四填乾格一填絲竹現商各乘次之等凡現商乘次之等自上而下因廉遞加第一廉皆用
  hash: sha256:c5b42b6a1d97bd8a15c2019b431e21166ade0cc89bb5b065b5141d763d3cee7c
